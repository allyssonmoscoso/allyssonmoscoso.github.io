<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Allysson Moscoso Portfolio</title>
  <desc id="desc">Retro-ops social preview card for Allysson Moscoso's portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="58" x2="1060" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071018" />
      <stop offset="1" stop-color="#04070B" />
    </linearGradient>
    <linearGradient id="panel" x1="157" y1="100" x2="1006" y2="558" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1624" stop-opacity="0.95" />
      <stop offset="1" stop-color="#09111D" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="stroke" x1="159" y1="92" x2="1012" y2="563" gradientUnits="userSpaceOnUse">
      <stop stop-color="#70F5FF" stop-opacity="0.5" />
      <stop offset="1" stop-color="#FF5292" stop-opacity="0.38" />
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 98) rotate(60) scale(230 310)">
      <stop stop-color="#70F5FF" stop-opacity="0.35" />
