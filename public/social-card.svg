  <rect width="1200" height="630" fill="#04070B" />
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3" />
  <circle cx="250" cy="90" r="260" fill="url(#glowA)" />
  <circle cx="960" cy="180" r="240" fill="url(#glowB)" />

  <rect x="92" y="72" width="1016" height="486" rx="34" fill="url(#panel)" stroke="url(#stroke)" stroke-width="2" />
