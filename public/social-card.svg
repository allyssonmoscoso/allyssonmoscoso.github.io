  <text x="774" y="392" fill="#F4F7FB" font-family="'IBM Plex Sans', sans-serif" font-size="30" font-weight="600">Automation</text>
  <text x="774" y="428" fill="#F4F7FB" font-family="'IBM Plex Sans', sans-serif" font-size="30" font-weight="600">Observability</text>
  <text x="774" y="464" fill="#F4F7FB" font-family="'IBM Plex Sans', sans-serif" font-size="30" font-weight="600">Backend Delivery</text>
