    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(990 170) rotate(120) scale(250 310)">
      <stop stop-color="#FF5292" stop-opacity="0.25" />
      <stop offset="1" stop-color="#FF5292" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="white" stroke-opacity="0.08" />
    </pattern>
